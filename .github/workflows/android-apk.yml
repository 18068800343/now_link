name: Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - "android/NowLinkMobile/**"
      - ".github/workflows/android-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/NowLinkMobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5
      - name: Build debug APK
        run: gradle assembleDebug
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nowlink-mobile-debug-apk
          path: android/NowLinkMobile/app/build/outputs/apk/debug/*.apk
